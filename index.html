<!DOCTYPE html>
<html>
<head>
    <title>Movies App - MovieScope</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>MovieScope</h1>
        <div class="search-section">
            <input type="text" id="search-input" placeholder="Enter movie name...">
            <button id="search-button">Search</button>
        </div>
    </header>

    <div class="container">
        <div id="movie-list" class="movie-grid">
            <p>Loading movies...</p>
        </div>
    </div>

    <footer>
        <p>Copyright 2026 - My Movie Website</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
